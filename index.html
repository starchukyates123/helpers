<body>
<div id="app"></div>

<script>
  const STRIPE_URL = 'https://buy.stripe.com/9B66oH1up0T31FMeA8bwk00';
  const $ = s => document.querySelector(s);
  const hash = p => btoa(p).slice(0,16);

  // App State
  let state = {
    isAdmin: false,
    isSupporter: false,
    pass: localStorage.getItem('admin_pass') || '', // Keeping local pass just for UI unlock for now
    supporterCode: '',
    settings: {
      title: 'Support Our Grow',
      subtitle: 'Join Ariana\'s AI Helper Evolution',
      price: '$4.99/mo',
      about: 'Follow our journey as we learn and grow together. Exclusive content for supporters!'
    },
    posts: [],
    gallery: [],
    editing: null,
    draft: { photos: [], video: null },
    adminTab: 'settings'
  };

  // 1. Initializer: Fetches data from db
  async function init() {
    // Check local session
    state.isAdmin = sessionStorage.getItem('admin') === '1';
    state.isSupporter = sessionStorage.getItem('supporter') === '1';

    // Fetch Settings
    const { data: settingsData } = await db.from('settings').select('*').single();
    if (settingsData) {
      state.settings = { ...state.settings, ...settingsData };
      state.supporterCode = settingsData.supporterCode || state.supporterCode;
    }

    // Fetch Posts
    const { data: postsData } = await db.from('posts').select('*').order('id', { ascending: false });
    if (postsData) {
      state.posts = postsData;
    }

    // Check Stripe Success
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.get('success') === 'true' && state.supporterCode) {
      showStripeSuccess();
      return;
    }
    
    render();
  }

  // 2. Database Save Functions
  async function saveSettings() {
    state.settings.title = $('#title').value;
    state.settings.subtitle = $('#subtitle').value;
    state.settings.about = $('#about').value;
    state.settings.price = $('#price').value;
    state.supporterCode = $('#supporterCode').value.trim();

    const { error } = await db
      .from('settings')
      .upsert({ id: 1, ...state.settings, supporterCode: state.supporterCode });

    if (error) {
      console.error("Settings Error:", error);
      alert('Error saving settings to db.');
    } else {
      alert('✓ Settings saved successfully to the cloud!');
      render();
    }
  }

  async function publishPost() {
    let c = $('#content').value.trim();
    if (!c) return alert('Please write some content for your post');
    
    let newPost = {
      content: c,
      photos: [...state.draft.photos],
      video: state.draft.video,
      locked: $('#locked').checked,
      date: new Date().toLocaleDateString('en-US', {year: 'numeric', month: 'long', day: 'numeric'})
    };
    
    // Save to db instead of local array
    const { error } = await db.from('posts').insert([newPost]);
    
    if (error) {
      console.error("Post Error:", error);
      alert('Failed to save post to database.');
    } else {
      state.draft = {photos: [], video: null};
      init(); // Re-fetch all posts from DB
      window.scrollTo({top: 0, behavior: 'smooth'});
    }
  }

  // 3. File Upload Functions (Fixed async logic)
  async function handlePhotos(e) {
    const files = Array.from(e.target.files).slice(0, 10 - state.draft.photos.length);
    if (state.draft.photos.length >= 10) return alert('Maximum 10 photos per post');
    
    for (const file of files) {
      const fileName = `${Date.now()}_${file.name}`;
      
      // Upload to db Storage Bucket (Make sure you create a bucket named 'photos')
      const { data, error } = await db.storage
        .from('photos') 
        .upload(fileName, file);

      if (error) {
        console.error("Upload Error:", error);
        alert('Image upload failed.');
        continue;
      }

      // Get Public URL
      const { data: urlData } = db.storage.from('photos').getPublicUrl(fileName);
      state.draft.photos.push(urlData.publicUrl);
    }
    
    render();
  }

  function removePhoto(i) {
    state.draft.photos.splice(i, 1);
    render();
  }

  // 4. UI Rendering Functions
  function showStripeSuccess() {
    $('#app').innerHTML = `
      <div class="hero">
        <div class="card success-banner" style="max-width:600px">
          <h1 style="font-size:2rem;margin-bottom:1rem">🎉 Thank You!</h1>
          <p style="color:#86efac;margin-bottom:1.5rem">Your subscription is active!</p>
          <div style="background:rgba(0,0,0,0.3);padding:1.5rem;border-radius:0.5rem;margin:1.5rem 0">
            <p style="color:#94a3b8;font-size:0.875rem;margin-bottom:0.5rem">Your access code:</p>
            <p style="font-size:1.75rem;font-weight:700;color:#fcd34d;letter-spacing:0.05em">${state.supporterCode}</p>
          </div>
          <p style="color:#cbd5e1;font-size:0.9375rem;margin-bottom:1.5rem">Enter this code in 'Supporter Login' to unlock all exclusive content.</p>
          <button class="btn btn-primary" style="width:100%" onclick="window.location.href=window.location.pathname">Go to Site</button>
        </div>
      </div>`;
  }

  function render() {
    let app = $('#app');
    
    if (!state.pass) {
      app.innerHTML = `
        <div class="hero">
          <div class="card" style="max-width:500px">
            <h1>🔐 Set Admin Password</h1>
            <p style="color:#94a3b8;margin:1rem 0">Create password to manage your site. You'll set the supporter code later.</p>
            <input type="password" id="newpass" placeholder="Enter admin password (min 4 chars)" onkeypress="if(event.key==='Enter')setPass()">
            <button class="btn btn-primary" style="width:100%;margin-top:1rem" onclick="setPass()">Set Password & Launch</button>
          </div>
        </div>`;
      return;
    }

    if (state.isAdmin) {
      renderAdmin();
      return;
    }

    renderPublic();
  }

  function renderAdmin() {
    let totalPosts = state.posts.length;
    let lockedPosts = state.posts.filter(p => p.locked).length;
    let publicPosts = totalPosts - lockedPosts;
    
    $('#app').innerHTML = `
      <div class="header">
        <button class="btn btn-secondary" onclick="togglePreview()">👁️ Preview Site</button>
        <button class="btn btn-danger" onclick="logoutAdmin()">Logout Admin</button>
      </div>
      <div class="container" style="padding-top:5rem">
        <div class="card">
          <h2>📊 Dashboard</h2>
          <div class="stats-grid">
            <div class="stat-card">
              <div class="stat-value">${totalPosts}</div>
              <div class="stat-label">Total Posts</div>
            </div>
            <div class="stat-card">
              <div class="stat-value">${publicPosts}</div>
              <div class="stat-label">Public Posts</div>
            </div>
            <div class="stat-card">
              <div class="stat-value">${lockedPosts}</div>
              <div class="stat-label">🔒 Locked Posts</div>
            </div>
            <div class="stat-card">
              <div class="stat-value">${state.gallery.length}</div>
              <div class="stat-label">Gallery Photos</div>
            </div>
          </div>
        </div>
        
        <div class="card admin-section">
          <div class="tabs">
            <button class="tab ${state.adminTab === 'settings' ? 'active' : ''}" onclick="switchTab('settings')">⚙️ Site Settings</button>
            <button class="tab ${state.adminTab === 'posts' ? 'active' : ''}" onclick="switchTab('posts')">✍️ Posts</button>
            <button class="tab ${state.adminTab === 'gallery' ? 'active' : ''}" onclick="switchTab('gallery')">🖼️ Edit Gallery</button>
          </div>
          
          ${state.adminTab === 'settings' ? renderSettingsTab() : ''}
          ${state.adminTab === 'posts' ? renderPostsTab() : ''}
          ${state.adminTab === 'gallery' ? renderGalleryTab() : ''}
        </div>
      </div>`;
  }

  function renderSettingsTab() {
    return `
      <h2>⚙️ Site Settings</h2>
      <label>Hero Title</label>
      <input id="title" value="${state.settings.title}">
      <label>Hero Subtitle</label>
      <input id="subtitle" value="${state.settings.subtitle}">
      <label>About Text</label>
      <textarea id="about" rows="3">${state.settings.about}</textarea>
      <label>Monthly Price Display</label>
      <input id="price" value="${state.settings.price}">
      <label style="color:#fcd34d;font-weight:600">🎟️ Set Supporter Access Code</label>
      <input id="supporterCode" value="${state.supporterCode}" placeholder="e.g. TINY2026">
      <p style="font-size:0.75rem;color:#94a3b8;margin-top:0.5rem">Supporters enter this code after subscribing to unlock 🔒 content. Leave blank to disable supporter logins.</p>
      <button class="btn btn-primary" style="width:100%;margin-top:1.5rem" onclick="saveSettings()">💾 Save Settings to db</button>
    `;
  }

  function renderPostsTab() {
    return `
      <h2>${state.editing !== null ? '✏️ Edit Post' : '✍️ New Post'}</h2>
      <textarea id="content" rows="4" placeholder="What's new? Share updates, thoughts, progress...">${state.editing !== null ? state.posts[state.editing].content : ''}</textarea>
      
      <label>Photos (max 10)</label>
      <input type="file" id="photos" accept="image/*" multiple onchange="handlePhotos(event)">
      <div class="grid-3">
        ${state.draft.photos.map((p,i)=>`
          <div style="position:relative">
            <img src="${p}">
            <button class="btn btn-danger" style="position:absolute;top:0.25rem;right:0.25rem;padding:0.25rem 0.5rem;font-size:0.75rem" onclick="removePhoto(${i})">✕</button>
          </div>`).join('')}
      </div>
      
      <div class="checkbox">
        <input type="checkbox" id="locked" ${state.editing !== null && state.posts[state.editing].locked ? 'checked' : ''}>
        <label for="locked" style="margin:0;cursor:pointer">🔒 Supporter-Only Content (${state.settings.price})</label>
      </div>
      
      <button class="btn btn-primary" style="width:100%" onclick="publishPost()">${state.editing !== null ? '✓ Update Post' : '🚀 Publish Post'}</button>
      ${state.editing !== null ? '<button class="btn btn-secondary" style="width:100%;margin-top:0.5rem" onclick="cancelEdit()">Cancel</button>' : ''}
      
      <hr style="margin:2rem 0;border-color:rgba(255,255,255,0.1)">
      
      <h2>📋 All Posts</h2>
      ${state.posts.length ? state.posts.map((p,i)=>`

          <div style="display:flex;justify-content:space-between;align-items:start;margin-bottom:1rem;flex-wrap:wrap;gap:0.5rem">
            <div>
              <span style="color:#60a5fa;font-weight:500">${p.date}</span>
              <span class="badge ${p.locked ? 'badge-locked' : 'badge-public'}">${p.locked ? '🔒 Locked' : '🌍 Public'}</span>
            </div>
            <div style="display:flex;gap:0.5rem;flex-wrap:wrap">
              <button class="btn btn-danger" style="padding:0.5rem 1rem;font-size:0.875rem" onclick="deletePost(${p.id})">Delete</button>
            </div>
          </div>
          <p style="color:#cbd5e1;margin-bottom:1rem;white-space:pre-wrap">${p.content}</p>
          ${p.photos && p.photos.length ? `
            <div class="grid-3">
              ${p.photos.slice(0, p.expanded ? 10 : 3).map(img => `<img src="${img}" onclick="openModal('${img}')">`).join('')}
              ${p.photos.length > 3 && !p.expanded ? `<button class="btn btn-secondary" style="grid-column:span 3" onclick="expand(${i})">Show ${p.photos.length-3} more photos</button>` : ''}
            </div>` : ''}
        </div>`).join('') : '<p style="color:#94a3b8;text-align:center;padding:3rem">No posts yet. Create your first one above!</p>'}
    `;
  }

  function renderGalleryTab() {
    return `
      <h2>🖼️ Featured Gallery</h2>
      <p style="color:#94a3b8;margin-bottom:1.5rem">Gallery Supabase upload not yet implemented in this demo.</p>
    `;
  }

  function renderPublic() {
    let lockedCount = state.posts.filter(p => p.locked).length;
    
    $('#app').innerHTML = `
      ${state.isSupporter ? `
        <div class="header">
          <button class="btn btn-secondary" onclick="logoutSupporter()">Logout Supporter</button>
        </div>` : ''}
      
      <div class="hero">
        <div class="hero-content">
          <h1>${state.settings.title}</h1>
          <p>${state.settings.subtitle}</p>
          <p style="color:#cbd5e1;max-width:700px;margin:0 auto 2rem">${state.settings.about}</p>
          <a href="${STRIPE_URL}?success_url=${encodeURIComponent(window.location.origin + window.location.pathname + '?success=true')}" target="_blank" class="btn btn-primary" style="font-size:1.125rem;padding:1rem 2rem">
            💎 Subscribe ${state.settings.price} - Unlock All Content
          </a>
          
          ${!state.isSupporter ? `
            <div class="login-grid">
              <div class="card" style="text-align:left">
                <h3 style="margin-bottom:1rem;color:#a78bfa">👑 Admin Login</h3>
                <input type="password" id="loginpass" placeholder="Admin password" onkeypress="if(event.key==='Enter')loginAdmin()">
                <button class="btn btn-primary" style="width:100%;margin-top:0.5rem" onclick="loginAdmin()">Login as Admin</button>
              </div>
              
              <div class="card" style="text-align:left">
                <h3 style="margin-bottom:1rem;color:#fcd34d">🎟️ Supporter Login</h3>
                ${state.supporterCode ? `
                  <input type="text" id="suppcode" placeholder="Enter your access code" onkeypress="if(event.key==='Enter')loginSupporter()">
                  <button class="btn btn-primary" style="width:100%;margin-top:0.5rem;background:linear-gradient(135deg,#f59e0b,#d97706)" onclick="loginSupporter()">Access Supporter Content</button>
                  <p style="color:#94a3b8;font-size:0.75rem;margin-top:1rem;text-align:center">Subscribe above to receive your code</p>
                ` : `
                  <p style="color:#94a3b8;text-align:center;padding:1rem">Supporter access not configured by admin yet.</p>
                `}
              </div>
            </div>` : `
            <div class="card success-banner" style="max-width:500px;margin:2rem auto 0">
              <p style="color:#86efac;font-size:1.125rem">✓ Logged in as Supporter</p>
              <p style="color:#cbd5e1;font-size:0.875rem;margin-top:0.5rem">You have access to all ${lockedCount} exclusive posts below</p>
            </div>`}
        </div>
      </div>
      
      <div class="container" style="padding-top:2rem">
        <h2 style="text-align:center;margin-bottom:2rem;font-size:2rem">📝 Latest Posts</h2>
        ${state.posts.map((p,i)=>`
          <div class="post ${p.locked && !state.isSupporter ? 'locked' : ''}">
            ${p.locked && !state.isSupporter ? `
              <div style="font-size:3rem;margin-bottom:1rem">🔒</div>
              <h3>Supporter-Only Content</h3>
              <p style="color:#94a3b8;margin:1rem 0">Subscribe ${state.settings.price} to unlock this exclusive post</p>
              <a href="${STRIPE_URL}?success_url=${encodeURIComponent(window.location.origin + window.location.pathname + '?success=true')}" target="_blank" class="btn btn-primary">Subscribe Now</a>
            ` : `
              <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;flex-wrap:wrap;gap:0.5rem">
                <span style="color:#60a5fa;font-weight:500">${p.date}</span>
                ${p.locked ? '<span class="badge badge-locked">🔒 Exclusive</span>' : '<span class="badge badge-public">🌍 Public</span>'}
              </div>
              <p style="color:#cbd5e1;margin-bottom:1rem;white-space:pre-wrap;font-size:1.0625rem">${p.content}</p>
              ${p.photos && p.photos.length ? `
                <div class="grid-3">
                  ${p.photos.slice(0, p.expanded ? 10 : 3).map(img => `<img src="${img}" onclick="openModal('${img}')" alt="Post image">`).join('')}
                  ${p.photos.length > 3 && !p.expanded ? `<button class="btn btn-secondary" style="grid-column:span 3" onclick="expand(${i})">Show ${p.photos.length-3} more photos</button>` : ''}
                  ${p.photos.length > 3 && p.expanded ? `<button class="btn btn-secondary" style="grid-column:span 3" onclick="collapse(${i})">Show less</button>` : ''}
                </div>` : ''}
            `}
          </div>`).join('') || '<div class="card" style="text-align:center"><p style="color:#94a3b8;padding:2rem">No posts yet. Check back soon!</p></div>'}
      </div>`;
  }

  // 5. Auth & General Logic
  function setPass() {
    let p = $('#newpass').value;
    if (!p || p.length < 4) return alert('Password must be at least 4 characters');
    state.pass = hash(p);
    localStorage.setItem('admin_pass', state.pass);
    sessionStorage.setItem('admin', '1');
    state.isAdmin = true;
    render();
  }

  function loginAdmin() {
    let p = $('#loginpass').value;
    if (hash(p) === state.pass) {
      sessionStorage.setItem('admin', '1');
      state.isAdmin = true;
      render();
    } else {
      alert('Incorrect admin password');
    }
  }

  function loginSupporter() {
    let code = $('#suppcode').value.trim();
    if (state.supporterCode && code === state.supporterCode) {
      sessionStorage.setItem('supporter', '1');
      state.isSupporter = true;
      render();
    } else {
      alert('Invalid access code.');
    }
  }

  function logoutAdmin() {
    sessionStorage.removeItem('admin');
    state.isAdmin = false;
    render();
  }

  function logoutSupporter() {
    sessionStorage.removeItem('supporter');
    state.isSupporter = false;
    render();
  }

  function switchTab(tab) {
    state.adminTab = tab;
    render();
  }

  function expand(i) {
    state.posts[i].expanded = true;
    render();
  }

  function collapse(i) {
    state.posts[i].expanded = false;
    render();
  }

  function togglePreview() {
    state.isAdmin = false;
    sessionStorage.setItem('admin', '0');
    render();
    window.scrollTo({top: 0, behavior: 'smooth'});
  }

  async function deletePost(id) {
    if (confirm('Delete this post permanently?')) {
      await supabase.from('posts').delete().eq('id', id);
      init(); // Re-fetch from DB
    }
  }

  function openModal(src) {
    let modal = document.createElement('div');
    modal.className = 'modal';
    modal.innerHTML = `
      <button class="modal-close" onclick="this.parentElement.remove()">×</button>
      <img src="${src}" alt="Full size image">
    `;
    modal.onclick = (e) => {
      if (e.target === modal) modal.remove();
    };
    document.body.appendChild(modal);
  }

  // START APPLICATION
  init();

</script>
</body>
</html>
